<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Incremental Game</title>

    <link rel="stylesheet" href="styles.css">
    
</head>
<body>

    <div class = "displayVaribles">
        <p id= "displayKnowledge">Knowledge: </p>
        <p id= "displayMood">Mood: </p>
        <p id= "displayDay">Day: </p>
        <p id= "displayYear">Age: </p> <p id="displayLifespan" class = "hidden">Lifespan: </p>

        <p id= "displayWisdom" class = "hidden">Wisdom: 0</p>        
    </div>


    <div class = "tabs">
        <button class = "tab-button" data-tab="Creation">Creation</button>
        <button class = "tab-button" data-tab="Inventions">Inventions</button>
        <button class = "tab-button" data-tab="Work">Work</button>
        <button class = "tab-button" data-tab="Other">Other</button>
    </div>


    <nav class = "tab-content" id = "Creation">
        <br>
        <button id = "createKnowledge" class = "anyButton" >Birth the seed of knowledge</button>
        <button id = "switchtoWisdom" class = "anyButton hidden" >Become wise 5:1</button>






        <div class = "hidden" id="vitContainer">
            <div class="progress-container" title = "Vitality increases your lifespan through unknown means.." id = "vitbtn">
                <div class="progress-bar" id="vit"></div>
                <span class= "progress-text" id = "vitLevelDisplay">Vitality Level: 1</span>
            </div>
        </div>

        <div class = "hidden" id="flexContainer">
            <div class="progress-container" title = "Staying flexable increases vitality growth rate!" id = "flexbtn">
                <div class="progress-bar" id="flex"></div>
                <span class= "progress-text" id = "flexLevelDisplay">Flexibility Level: 1</span>
            </div>
        </div>

        <div class = "hidden" id="knowledgeContainer">
            <div class="progress-container" title = "Study how to learn more" id = "knowledgebtn">
                <div class="progress-bar" id="knowledge"></div>
                <span class= "progress-text" id = "knowledgeLevelDisplay">Knowledge Level: 1</span>
            </div>
        </div>

    </nav>



    <nav class = "tab-content" id = "Inventions">

        <br>
        <button id = "unlocklifespanTimer" class = "hidden upgrade">Peer into the future - Costs 1000 Knowledge</button>
        <button id = "unlock1" class = "hidden upgrade">Create Health Exercise Plan - Cost 100 Knowledge</button>
        <button id = "unlockwisdombtn" class = "hidden upgrade">Learn the act of wisdom - Costs 35 Knowledge</button>
        <button id = "unlockknowledgebtn" class = "hidden upgrade">Study how to learn better - Costs 10 Wisdom</button>

    </nav>
    

    <nav class = "tab-content" id = "Work">


    </nav>


    <nav id = "Story">
        <h1 id = "storyTitle">Story</h1>

        <p id = "messageplaceholder">Nothing is here.</p>

    </nav> 

    <nav class = "tab-content" id = "Other">
        <h1>Help</h1>
        <p>Knowledge: Used to unlock other upgrades</p>

        <h1>Statistics</h1>

    </nav>  

    <script src="main.js" defer></script>
    <script src="functions.js" defer></script>
    <script src="bars.js" defer></script>
    <script src="upgrade.js" defer></script>



</body>

</html>
